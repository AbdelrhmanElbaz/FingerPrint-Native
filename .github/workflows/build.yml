name: Build EXE

# يشتغل عند أي Push على main، وكمان يدويًا من تبويب Actions (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    # لازم Windows runner — البرنامج مبني بـ PySide6 ومستهدف Windows فقط
    runs-on: windows-latest

    steps:
      - name: Checkout الكود
        uses: actions/checkout@v4

      - name: تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت المتطلبات
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: بناء الـ exe (PyInstaller)
        run: |
          pyinstaller packaging/build.spec --noconfirm

      # الناتج بيبقى في dist/AttendanceApp.exe (اسم exe متعرّف في build.spec)
      - name: رفع الـ exe كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AttendanceApp-windows
          path: dist/AttendanceApp.exe
          if-no-files-found: error
